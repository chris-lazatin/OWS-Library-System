<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0055ff">
  <title>Book List Print Preview | OWS Library System</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="print-page">
  <main class="print-shell">
    <header class="print-toolbar">
      <div>
        <h1>Book List Print Preview</h1>
        <p>Olongapo Wesley School, Inc. Library System</p>
      </div>
      <div class="print-actions">
        <button class="primary-button" type="button" data-pdf-download>Save as PDF</button>
        <button class="secondary-button" type="button" data-pdf-download>Download</button>
        <button id="printPage" class="secondary-button" type="button">Print</button>
        <a class="secondary-button print-link" href="book-list.html">Back</a>
      </div>
    </header>

    <section id="printDocument" class="print-document">
      <header class="print-document-header">
        <h2>Complete Book List Report</h2>
        <p id="generatedDate"></p>
      </header>
      <div class="print-table-wrap">
        <table class="data-table print-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Call Number</th>
              <th>Accession</th>
              <th>Author/Responsibility</th>
              <th>Publisher</th>
              <th>Date</th>
              <th>Location</th>
              <th>Category</th>
              <th>ISBN</th>
              <th>Entered By</th>
            </tr>
          </thead>
          <tbody id="printBookTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <script type="module" src="../js/pages/bookListPrint.js"></script>
</body>
</html>
